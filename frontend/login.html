<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-glow {
            box-shadow: 0 0 20px rgba(177, 255, 36, 0.15);
        }
        .glass-panel {
            background: rgba(26, 25, 25, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>

<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Container -->
<main class="w-full max-w-md px-6 py-12 relative z-10">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<h1 class="text-3xl font-black italic tracking-tighter text-primary">KINETIC AI</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-wide uppercase">Performance Intelligence Dashboard</p>
</div>
<!-- Central Login Card -->
<div class="surface-container glass-panel rounded-lg p-8 kinetic-glow">
<div class="mb-8">
<h2 class="text-2xl font-bold tracking-tight text-white">Welcome Back</h2>
<p class="text-on-surface-variant text-sm mt-1">Access your elite performance metrics.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-highest border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all outline-none" id="email" placeholder="athlete@kinetic.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end ml-1">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-full kinetic-glow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-[0.6875rem] font-bold uppercase tracking-widest">
<span class="bg-[#1a1919] px-4 text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Sign In -->
<button class="w-full bg-surface-container-highest text-on-surface font-semibold py-4 rounded-full border border-outline-variant/20 hover:bg-surface-bright transition-colors flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Sign in with Google</span>
</button>
</div>
<!-- Footer Link -->
<p class="text-center mt-10 text-on-surface-variant text-sm font-medium">
            Don't have an account? 
            <a class="text-primary hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
<!-- Legal and Background Image hint -->
<div class="mt-20 flex justify-center gap-8 opacity-40">
<a class="text-[0.625rem] font-bold uppercase tracking-widest hover:text-white" href="#">Privacy Policy</a>
<a class="text-[0.625rem] font-bold uppercase tracking-widest hover:text-white" href="#">Terms of Service</a>
</div>
</main>
<!-- Background Elements -->
<div class="fixed inset-0 z-0 opacity-10 pointer-events-none">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
</div>
<div class="fixed bottom-10 left-10 z-0 hidden lg:block opacity-20">
<div class="text-[10rem] font-black italic tracking-tighter text-outline-variant leading-none select-none">FOCUS</div>
</div>
<!-- Decorative Image Placeholder as Background Texture Component -->
<div class="fixed inset-0 z-[-1] overflow-hidden">
<img class="w-full h-full object-cover opacity-10 scale-110 blur-sm" data-alt="abstract close-up of high-performance carbon fiber textures with neon green light streaks and futuristic atmospheric smoke" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHSHNO5I7fRoYY0osUXlJA9-MZ5fdKy1Uewff-Ptz0mqOuSblGGs-y0Xu_dS_sSRaRlNs-r3aeoGj2rNNje0GC2nIytVbbOsENdEr46eG8ETiEmAV5D-RXRKmZygfYluA5surHfEnSeyQdLvkwh3DeIWMCh6q97Tra3TOjNtS860cumYi5FOs6YvC7txujF3tYxr6uk6GFDHzSNYQQBEgWaXQMSq6K61Kw_q_zOy8uCN23oLy4f-Pd-6R4ipfJPHy7WLX2HsyadPJx"/>
</div>
</body></html>
