<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24262b"/>
      <stop offset="100%" stop-color="#121316"/>
    </linearGradient>

    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="25" y="25" width="450" height="450" rx="110" fill="url(#bg-grad)" stroke="#2a2c33" stroke-width="4"/>

  <g filter="url(#glow)">
    
    <path d="M 220 350
             L 330 350
             A 80 80 0 0 0 410 270
             L 410 180
             A 80 80 0 0 0 330 100
             L 170 100
             A 80 80 0 0 0 90 180
             L 90 270
             A 80 80 0 0 0 170 350
             L 170 420
             L 220 350 Z"
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="22" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>

    <path d="M 280 120
             L 190 250
             L 255 250
             L 220 350
             L 320 220
             L 255 220
             Z"
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="22" 
          stroke-linejoin="round"
          stroke-linecap="round"/>
          
  </g>
</svg>
