services:
  mysql:
    image: mysql:8.0
    container_name: fitnesscoach_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: phucdai011
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fitnesscoach-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: fitnesscoach_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama 
    environment:
      - OLLAMA_ORIGINS=*
    networks:
      - fitnesscoach-network

  ollama_pull_bge_m3:
    image: ollama/ollama:latest
    container_name: fitnesscoach_ollama_pull_bge_m3
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "until ollama list; do sleep 2; done;
       ollama pull bge-m3"
    networks:
      - fitnesscoach-network
    restart: "no"

  mongodb:
    image: mongo:7.0
    container_name: fitnesscoach_mongodb
    restart: always
    ports:
    - "27017:27017"
    volumes:
    - mongodb_data:/data/db
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
    - fitnesscoach-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fitnesscoach_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ADMIN
      RABBITMQ_DEFAULT_PASS: ADMIN
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fitnesscoach-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: fitnesscoach_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fitnesscoach-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: fitnesscoach_auth_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7001:8080"
    env_file:
      - .env.auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - fitnesscoach-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fitnesscoach_qdrant
    restart: always
    ports:
      - "6334:6334" # gRPC
      - "6333:6333" # REST
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant-snapshots:/qdrant/snapshots
    networks:
      - fitnesscoach-network

  ai_service:
    build:
      context: ./AIService
      dockerfile: Dockerfile
    container_name: fitnesscoach_ai_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama_pull_bge_m3:
        condition: service_completed_successfully
    ports:
      - "7002:8080" # Exposed on port 7002 to avoid conflict with auth_service
    env_file:
      - .env.ai
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=Asia/Ho_Chi_Minh
    sysctls:
      net.ipv4.tcp_keepalive_time: 60
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 6
    networks:
      - fitnesscoach-network

  node_service:
    build:
      context: ./NodeService
      dockerfile: Dockerfile
    container_name: fitnesscoach_node_service
    restart: on-failure
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7003:7003"
    env_file:
      - .env.node
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/ai-fitness-coach
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - fitnesscoach-network

  api_gateway:
    build:
      context: ./APIGateway
      dockerfile: Dockerfile
    container_name: fitnesscoach_api_gateway
    restart: on-failure
    depends_on:
      auth_service:
        condition: service_started
      ai_service:
        condition: service_started
      node_service:
        condition: service_started
    ports:
      - "7000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=8080
    networks:
      - fitnesscoach-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: http://localhost:7000
        VITE_WORKOUT_API_URL: http://localhost:7000
        VITE_SIGNALR_CHAT_URL: http://localhost:7000/hubs/chat
        VITE_PROGRESS_API_URL: http://localhost:7000
    container_name: fitnesscoach_frontend
    restart: on-failure
    depends_on:
      api_gateway:
        condition: service_started
    ports:
      - "5173:80"
    networks:
      - fitnesscoach-network

  
networks:
  fitnesscoach-network:
    driver: bridge

volumes:
  mysql_data:
  mongodb_data:
  rabbitmq_data:
  qdrant_data:
  ollama_data:
  redis_data:
