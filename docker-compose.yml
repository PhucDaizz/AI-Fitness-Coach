services:
  mysql:
    image: mysql:8.0
    container_name: fitnesscoach_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: phucdai011
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fitnesscoach-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: fitnesscoach_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama 
    environment:
      - OLLAMA_ORIGINS=*
    networks:
      - fitnesscoach-network

  mongodb:
    image: mongo:7.0
    container_name: fitnesscoach_mongodb
    restart: always
    ports:
    - "27017:27017"
    volumes:
    - mongodb_data:/data/db
    networks:
    - fitnesscoach-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fitnesscoach_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ADMIN
      RABBITMQ_DEFAULT_PASS: ADMIN
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fitnesscoach-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: fitnesscoach_auth_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7001:8080"
    env_file:
      - .env.auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - fitnesscoach-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fitnesscoach_qdrant
    restart: always
    ports:
      - "6334:6334" # gRPC
      - "6333:6333" # REST
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - fitnesscoach-network

  ai_service:
    build:
      context: ./AIService
      dockerfile: Dockerfile
    container_name: fitnesscoach_ai_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "7002:8080" # Exposed on port 7002 to avoid conflict with auth_service
    env_file:
      - .env.example.ai
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=AI.Fitness.Coach.Service;user=root;password=phucdai011;
      - RabbitMQ__HostName=rabbitmq
      - Qdrant__Host=qdrant
      - Ollama__Url=http://ollama:11434
    networks:
      - fitnesscoach-network

  node_service:
    build:
      context: ./NodeService
      dockerfile: Dockerfile
    container_name: fitnesscoach_node_service
    restart: on-failure
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.node
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/ai-fitness-coach
    networks:
      - fitnesscoach-network

  
networks:
  fitnesscoach-network:
    driver: bridge

volumes:
  mysql_data:
  mongodb_data:
  rabbitmq_data:
  qdrant_data:
  ollama_data:
