<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic AI | Stream Chat Test Hub</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #111111;
            --surface-variant: #1a1a1a;
            --primary-color: #b1ff24;
            --primary-glow: rgba(177, 255, 36, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #adaaaa;
            --border-color: rgba(255, 255, 255, 0.08);
            --error-color: #ff4444;
            --success-color: #00c853;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-primary); 
            margin: 0; 
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            font-style: italic;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar / Configuration */
        .config-panel {
            width: 350px;
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            background: var(--surface-color);
        }

        h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        h3:first-of-type { margin-top: 0; }

        .form-group { margin-bottom: 1rem; }
        label { 
            display: block; 
            font-size: 0.7rem; 
            font-weight: 600; 
            color: var(--text-secondary); 
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            background: var(--surface-variant);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary { background: var(--surface-variant); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: #2a2a2a; border-color: var(--text-secondary); box-shadow: none; }

        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            position: relative;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            margin-bottom: 2rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-wrapper { justify-content: flex-end; }
        .ai-wrapper { justify-content: flex-start; }

        .message {
            max-width: 80%;
            padding: 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
        }

        .user-msg {
            background: var(--surface-variant);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            background: rgba(177, 255, 36, 0.03);
            border: 1px solid rgba(177, 255, 36, 0.1);
            color: #eee;
            border-bottom-left-radius: 2px;
            width: 100%;
        }

        .status-msg {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            max-width: 100%;
            margin: 1rem auto;
            padding: 0.5rem 1rem;
        }

        .error-msg {
            color: var(--error-color);
            border-color: var(--error-color);
            background: rgba(255, 68, 68, 0.05);
        }

        /* Markdown Styling */
        .ai-msg h1, .ai-msg h2, .ai-msg h3 { 
            color: var(--primary-color); 
            margin-top: 1.5rem; 
            margin-bottom: 0.75rem;
            font-weight: 800;
            font-style: italic;
        }
        .ai-msg p { margin-bottom: 1rem; }
        .ai-msg p:last-child { margin-bottom: 0; }
        
        .ai-msg code {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--primary-color);
        }

        .ai-msg pre {
            background: #000 !important;
            padding: 1rem !important;
            border-radius: 8px !important;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            margin: 1rem 0;
        }

        .ai-msg ul, .ai-msg ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .ai-msg li { margin-bottom: 0.5rem; }

        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem;
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }

        #questionBox {
            flex: 1;
            font-size: 1rem;
        }

        #btnSend {
            width: auto;
            padding: 0 2rem;
            margin-bottom: 0;
        }

        /* Status Indicator */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-connected { background: var(--success-color); box-shadow: 0 0 10px var(--success-color); }
        .status-disconnected { background: var(--error-color); box-shadow: 0 0 10px var(--error-color); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Loading cursor */
        .streaming-indicator::after {
            content: "█";
            animation: blink 0.8s infinite;
            color: var(--primary-color);
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Kinetic AI // <span style="color: white; opacity: 0.5;">Test Client</span></h1>
        <div id="connStatusText" style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);">
            <span id="connIndicator" class="status-dot status-disconnected"></span>
            DISCONNECTED
        </div>
    </header>

    <div class="main-layout">
        <div class="config-panel">
            <h3>1. Connection Protocol</h3>
            <div class="form-group">
                <label>Auth Token (JWT)</label>
                <input type="text" id="jwtToken" placeholder="Paste your token here...">
            </div>
            <div class="form-group">
                <label>API Base URL</label>
                <input type="text" id="baseUrl" value="http://localhost:7002">
            </div>
            <button id="btnConnect" onclick="connectHub()">Establish Connection</button>

            <h3>2. Session History</h3>
            <button type="button" class="btn-secondary" onclick="loadSessions()">Fetch Sessions</button>
            <div class="form-group">
                <select id="sessionList" onchange="selectSession(this.value)">
                    <option value="">-- Active Sessions --</option>
                </select>
            </div>

            <h3>3. Identity & Matrix</h3>
            <div class="form-group">
                <label>User Identifier</label>
                <input type="text" id="userId" value="admin-tester">
            </div>
            <div class="form-group">
                <label>Current Session ID</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="sessionId" readonly style="background: rgba(255,255,255,0.03); opacity: 0.6;">
                    <button type="button" class="btn-secondary" style="width: auto; padding: 0 0.75rem;" onclick="createNewSession()" title="New Session">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div id="chat-box">
                <div class="status-msg">SYSTEM READY // AWAITING CONNECTION...</div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="questionBox" placeholder="Enter your query..." onkeypress="if(event.key === 'Enter') sendQuestion()">
                    <button id="btnSend" onclick="sendQuestion()" disabled>Execute</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configure marked for Markdown
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            headerIds: false,
            mangle: false
        });

        let connection = null;
        let currentAiMessageDiv = null;
        let currentAiRawText = "";
        let currentMessageId = null;

        window.onload = () => {
            createNewSession();
        };

        function createNewSession() {
            const newSessionId = crypto.randomUUID();
            document.getElementById("sessionId").value = newSessionId;
            document.getElementById("chat-box").innerHTML = "";
            appendStatus(`NEW SESSION INITIALIZED: ${newSessionId}`);
        }

        async function connectHub() {
            const baseUrl = document.getElementById("baseUrl").value.replace(/\/$/, "");
            const token = document.getElementById("jwtToken").value.trim();
            const hubUrl = `${baseUrl}/hubs/chat`;
            const btnConnect = document.getElementById("btnConnect");
            const connIndicator = document.getElementById("connIndicator");
            const connStatusText = document.getElementById("connStatusText");

            btnConnect.disabled = true;
            btnConnect.textContent = "Negotiating...";

            connection = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl, {
                    accessTokenFactory: () => token 
                })
                .withAutomaticReconnect()
                .build();

            // Receive Streaming Chunk
            connection.on("ReceiveMessageChunk", (messageId, chunk) => {
                if (!currentAiMessageDiv || currentMessageId !== messageId) {
                    currentMessageId = messageId;
                    currentAiRawText = "";
                    
                    const wrapper = document.createElement("div");
                    wrapper.className = "message-wrapper ai-wrapper";
                    
                    currentAiMessageDiv = document.createElement("div");
                    currentAiMessageDiv.className = "message ai-msg streaming-indicator";
                    
                    wrapper.appendChild(currentAiMessageDiv);
                    document.getElementById("chat-box").appendChild(wrapper);
                }
                
                currentAiRawText += chunk;
                currentAiMessageDiv.innerHTML = marked.parse(currentAiRawText);
                scrollToBottom();
            });

            // Stream Completed
            connection.on("MessageCompleted", (messageId) => {
                if (currentAiMessageDiv) {
                    currentAiMessageDiv.classList.remove("streaming-indicator");
                }
                currentAiMessageDiv = null;
                currentAiRawText = "";
            });

            // Receive Full Message
            connection.on("ReceiveMessage", (messageId, role, content) => {
                appendMessage(content, role === "AI" ? "ai-msg" : "user-msg");
            });

            // Receive Error
            connection.on("ReceiveError", (errorMessage) => {
                appendStatus(`CORE ERROR: ${errorMessage}`, "error-msg");
            });

            // Title Update
            connection.on("SessionTitleUpdated", (sessionId, newTitle) => {
                appendStatus(`SESSION IDENTIFIER UPDATED: "${newTitle}"`);
            });

            try {
                await connection.start();
                connIndicator.className = "status-dot status-connected";
                connStatusText.innerHTML = `<span class="status-dot status-connected"></span> CONNECTED`;
                btnConnect.textContent = "Link Established";
                document.getElementById("btnSend").disabled = false;
                appendStatus("SIGNALR HUB CONNECTION ESTABLISHED");
            } catch (err) {
                console.error(err);
                connIndicator.className = "status-dot status-disconnected";
                btnConnect.disabled = false;
                btnConnect.textContent = "Retry Connection";
                appendStatus(`CRITICAL: HUB CONNECTION FAILED: ${err.toString()}`, "error-msg");
            }
        }

        async function loadSessions() {
            const baseUrl = document.getElementById("baseUrl").value.replace(/\/$/, "");
            const token = document.getElementById("jwtToken").value.trim();
            if (!token) { alert("Authorization Token Required."); return; }

            try {
                const response = await fetch(`${baseUrl}/api/Session`, {
                    headers: { "Accept": "*/*", "Authorization": `Bearer ${token}` }
                });

                if (response.ok) {
                    const res = await response.json();
                    const sessions = res.data || [];
                    const select = document.getElementById("sessionList");
                    select.innerHTML = '<option value="">-- Active Sessions --</option>';
                    sessions.forEach(s => {
                        const opt = document.createElement("option");
                        opt.value = s.id;
                        opt.textContent = `${s.title || 'Untitled Session'} (${s.id.substring(0,8)})`;
                        select.appendChild(opt);
                    });
                    appendStatus(`LOADED ${sessions.length} RECENT SESSIONS`);
                } else {
                    const errText = await response.text();
                    appendStatus(`API REJECTION: ${response.status}`, "error-msg");
                }
            } catch (err) {
                appendStatus(`NETWORK FAILURE: ${err.message}`, "error-msg");
            }
        }

        async function selectSession(sessionId) {
            if (!sessionId) { createNewSession(); return; }

            document.getElementById("sessionId").value = sessionId;
            document.getElementById("chat-box").innerHTML = ""; 
            appendStatus(`SYNCHRONIZING WITH SESSION: ${sessionId}`);

            const baseUrl = document.getElementById("baseUrl").value.replace(/\/$/, "");
            const token = document.getElementById("jwtToken").value.trim();
            if (!token) return;

            try {
                const response = await fetch(`${baseUrl}/api/Session/messages?sessionId=${sessionId}&pageSize=50`, {
                    headers: { "Accept": "*/*", "Authorization": `Bearer ${token}` }
                });

                if (response.ok) {
                    const res = await response.json();
                    const messages = res.data?.items || [];
                    const sortedMessages = messages.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    
                    sortedMessages.forEach(m => {
                        appendMessage(m.content, m.role === "User" ? "user-msg" : "ai-msg");
                    });
                    appendStatus(`SESSION HISTORY SYNCHRONIZATION COMPLETE`);
                } else {
                    appendStatus(`HISTORY RETRIEVAL FAILED`, "error-msg");
                }
            } catch(e) {
                appendStatus(`ERROR: ${e.message}`, "error-msg");
            }
        }

        async function sendQuestion() {
            const baseUrl = document.getElementById("baseUrl").value.replace(/\/$/, "");
            const question = document.getElementById("questionBox").value.trim();
            const sessionId = document.getElementById("sessionId").value.trim();
            const userId = document.getElementById("userId").value.trim();
            const token = document.getElementById("jwtToken").value.trim();
            const btnSend = document.getElementById("btnSend");

            if (!question) return;

            appendMessage(question, "user-msg");
            document.getElementById("questionBox").value = "";
            currentAiMessageDiv = null; 

            btnSend.disabled = true;

            const requestBody = { question, sessionId, userId };
            const headers = { "Content-Type": "application/json", "Accept": "application/json" };
            if (token) headers["Authorization"] = `Bearer ${token}`;

            try {
                const response = await fetch(`${baseUrl}/api/Rag/stream-chat`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    appendStatus(`POST FAILURE: ${response.status}`, "error-msg");
                }
            } catch (err) {
                appendStatus(`UPLINK FAILED: ${err.message}`, "error-msg");
            } finally {
                btnSend.disabled = false;
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById("chat-box");
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${className === "user-msg" ? "user-wrapper" : "ai-wrapper"}`;
            
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            
            if (className === "ai-msg") {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }
            
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);
            scrollToBottom();
        }

        function appendStatus(text, extraClass = "") {
            const chatBox = document.getElementById("chat-box");
            const statusDiv = document.createElement("div");
            statusDiv.className = `status-msg ${extraClass}`;
            statusDiv.textContent = `> ${text}`;
            chatBox.appendChild(statusDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById("chat-box");
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
